# nginx snippet — serve /uploads/* directly from disk.
#
# Why this exists
# ---------------
# Next.js scans the `public/` directory at boot time and serves
# whatever files exist at that moment. Files written to `public/`
# AFTER `next start` has booted (e.g. user-uploaded avatars via
# /api/users/[id]/avatar) are NOT visible to Next's static-asset
# router until the process restarts.
#
# So we let nginx serve user-uploaded assets directly from disk,
# bypassing Next entirely. This is the production-grade pattern:
#   • Files appear immediately after upload, no pm2 restart needed.
#   • Long cache because the filenames are content-addressed
#     (<userId>-<random>.<ext>); replacing an avatar generates a
#     NEW URL, so clients never need to bust the cache.
#   • Lower latency: nginx serves static files much faster than
#     Next's Node static handler.
#
# How to install
# --------------
# Drop this block inside the `server { server_name app.zentromeet.com; ... }`
# block in /etc/nginx/sites-enabled/scheduling-saas, BEFORE the
# `location /_next/static/` block and the catch-all `location /`
# block. (More specific prefix locations are matched first by nginx.)
#
# After editing:
#   sudo nginx -t          # validate config
#   sudo nginx -s reload   # apply
#
# Verify with:
#   curl -o /dev/null -w "HTTP %{http_code}\n" \
#     "https://app.zentromeet.com/uploads/avatars/<some-file>.png"

location /uploads/ {
    alias /var/www/scheduling-saas/public/uploads/;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000";
    try_files $uri =404;
}
