# =============================================================================
# codemagic.yaml — ZentroMeet Mobile CI/CD
# =============================================================================
#
# This file defines three Codemagic workflows for the ZentroMeet mobile app:
#
#   1) android-preview      — Builds an installable APK (debug or release) for
#                             direct sideload onto an Android device. Use this
#                             for internal testing and QA without going through
#                             EAS or Play Store review. Built on Codemagic via
#                             `expo prebuild` + Gradle (no EAS).
#
#   2) android-production   — Builds a signed Android App Bundle (.aab) ready
#                             for upload to Play Console (Internal/Closed/Open
#                             testing or Production track). Requires a release
#                             keystore configured in Codemagic. Built on
#                             Codemagic via `expo prebuild` + Gradle (no EAS).
#
#   3) ios-production       — Builds the iOS app NATIVELY on a Codemagic macOS
#                             (Apple-silicon) machine — NO EAS Build. Runs
#                             `expo prebuild` + CocoaPods + Xcode archive +
#                             Apple code signing + App Store IPA export, then
#                             OPTIONALLY uploads to TestFlight (held behind the
#                             PUBLISH_TO_TESTFLIGHT flag) using Codemagic's own
#                             App Store Connect publishing — never EAS submit,
#                             never App Store review.
#
# MONOREPO LAYOUT
# ---------------
# The mobile app lives at  mobile/  inside the larger
# zentroslots repository (which also holds the scheduling-saas backend at
# the repo root). This file lives at the REPOSITORY ROOT (codemagic.yaml) —
# Codemagic's default, auto-detected location. Each workflow below sets
# `working_directory: mobile` (resolved relative to the clone/repo root, NOT
# to this file) so all scripts execute from the mobile app root. Artifact
# globs are ALSO resolved relative to working_directory (mobile), so they are
# written WITHOUT a `mobile/` prefix (e.g. android/app/build/outputs/...).
# A `mobile/` prefix double-nests to mobile/mobile/... and matches nothing.
#
# REQUIRED ENVIRONMENT-VARIABLE GROUPS (configure in Codemagic UI under
# Teams → Global / App environment variables):
#
#   zentromeet_api:       (all three workflows)
#     EXPO_PUBLIC_API_BASE_URL — Defaults to https://app.zentromeet.com
#                                MUST be named exactly this — Expo inlines all
#                                EXPO_PUBLIC_* vars into the JS bundle at
#                                build time. (Codemagic does NOT perform
#                                $VAR substitution inside `vars:`, so we
#                                bind the public name in the group itself.)
#
#   app_store_credentials:  (ios-production only; used ONLY when
#                            PUBLISH_TO_TESTFLIGHT="true")
#     APP_STORE_CONNECT_ISSUER_ID      — App Store Connect API key Issuer ID
#     APP_STORE_CONNECT_KEY_IDENTIFIER — App Store Connect API key ID
#     APP_STORE_CONNECT_PRIVATE_KEY    — the .p8 private key contents (Secure)
#     Read by `app-store-connect publish` for the flag-gated TestFlight upload.
#     Mark all three Secure. (You configure the SAME key as a Codemagic App
#     Store Connect *integration* too — see "iOS code signing" below — but the
#     integration is for automatic signing; this group is what the publish
#     CLI reads.)
#
#   expo_credentials:     (VESTIGIAL — android-production only)
#     EXPO_TOKEN        — Historically used by EAS. After the iOS workflow was
#                         converted to a native Codemagic build, NO workflow
#                         requires EXPO_TOKEN. android-production still
#                         references this group in a NON-FATAL "Verify EAS
#                         authentication" step (the Gradle build works without
#                         it). It is NOT required and can be removed in a
#                         future cleanup. android-preview and ios-production do
#                         NOT reference it. eas.json is retained ONLY for the
#                         optional local `npm run build:*` / `submit:*` scripts
#                         (manual EAS fallback) — no Codemagic workflow uses it.
#
# REQUIRED CODE-SIGNING ASSETS
# ----------------------------
# ANDROID — upload a release keystore to:
#   Codemagic → Teams → Code Signing → Android keystores
# and name the entry exactly:  ZentroMeet
# Codemagic will automatically inject these env vars into the build:
#   CM_KEYSTORE_PATH, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
#
# iOS — automatic signing via a Codemagic App Store Connect API key INTEGRATION
# (NOT a committed cert/profile). Codemagic → Teams → Team integrations →
# Developer Portal → connect an App Store Connect API key (.p8 + Issuer ID +
# Key ID) and NAME it.  Reference that name under `integrations.app_store_connect`
# in ios-production (default below: zentromeet_asc_api_key). At build time
# Codemagic fetches/creates the Apple Distribution certificate + App Store
# provisioning profile for com.zentromeet.app. NOTHING sensitive lives in git.
#
# DOCS
# ----
# See docs/CODEMAGIC.md for end-to-end setup and troubleshooting, and
# docs/CODEMAGIC_NATIVE_IOS_BUILD.md for the native iOS build + signing +
# TestFlight specifics (what to configure in the Codemagic UI before the
# ios-production workflow can run).
# =============================================================================

workflows:

  # ===========================================================================
  # WORKFLOW 1: android-preview
  # ---------------------------------------------------------------------------
  # Produces an installable APK that testers can sideload directly onto their
  # phones. No Play Store review, no EAS queue. Built entirely on Codemagic's
  # linux_x2 machine via `expo prebuild` + Gradle.
  #
  # Signing: optional. If the ZentroMeet entry is configured,
  # builds a SIGNED release APK. Otherwise falls back to assembleDebug, which
  # is still fully installable (just signed with the debug key).
  #
  # Triggers: manual + push to the `develop` branch only.
  # ===========================================================================
  android-preview:
    name: "Android Preview — Installable APK"
    instance_type: linux_x2
    max_build_duration: 60
    working_directory: mobile

    environment:
      node: 20.17.0
      java: 17
      # Optional for preview — script falls back to assembleDebug if absent.
      android_signing:
        - ZentroMeet
      groups:
        # android-preview builds entirely on Codemagic via `expo prebuild`
        # + Gradle — NO EAS Build and NO Expo login are required. We only
        # need the public API base-URL group; EXPO_TOKEN / expo_credentials
        # is intentionally NOT referenced here.
        - zentromeet_api     # Provides EXPO_PUBLIC_API_BASE_URL
      vars:
        # NOTE: Codemagic does NOT perform $VAR substitution inside this
        # `vars:` block. EXPO_PUBLIC_API_BASE_URL must be set DIRECTLY
        # inside the zentromeet_api environment-variable group (Codemagic
        # UI → Teams → Global env vars → zentromeet_api group →
        # EXPO_PUBLIC_API_BASE_URL = https://app.zentromeet.com). That
        # way Expo inlines the resolved URL into the JS bundle at build
        # time. We intentionally do not redeclare it here.
        #
        # Gradle heap — 2.5 GB leaves ~1.5 GB for Node, Gradle daemon, OS.
        # Codemagic's linux_x2 standard instance has ~8 GB total; this
        # conservative heap still leaves ample room for Node, the Gradle
        # daemon, and the OS, avoiding OOM during RN 0.76 C++ codegen.
        GRADLE_OPTS: "-Xmx2560m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
        EXPO_NO_TELEMETRY: "1"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "develop"
          include: true
          source: true

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      # ----- 1. Environment info -------------------------------------------
      - name: Environment info
        script: |
          echo "Node:    $(node --version)"
          echo "npm:     $(npm --version)"
          echo "Java:    $(java -version 2>&1 | head -1)"
          echo "Expo:    $(npx --yes expo --version 2>/dev/null || echo 'will install on demand')"
          echo "Branch:  $CM_BRANCH"
          echo "Build:   $CM_BUILD_ID"
          echo "Workdir: $(pwd)"

      # ----- 2. Install dependencies (reproducible) ------------------------
      # package-lock.json IS committed (un-ignored 2026-06-15), so we use
      # `npm ci` for a clean, reproducible install pinned to the SDK-52
      # aligned versions (react-native 0.76.9, react-native-screens 4.4.0).
      # Output is teed to /tmp/install.log for the artifact bundle.
      - name: Install dependencies
        script: |
          # pipefail so a failing npm step propagates through `tee`.
          # Without it, `set -e` only checks tee's exit status (always 0).
          set -euo pipefail
          mkdir -p /tmp
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json is missing — it must be committed for reproducible CI." >&2
            exit 1
          fi
          npm ci --no-audit --no-fund 2>&1 | tee /tmp/install.log

      # ----- 3. Validation gate (fail fast BEFORE the Gradle build) --------
      # Catches the error classes that previously slipped to runtime: type
      # drift, Expo SDK dependency drift (the root cause of the prior boot
      # crash), and broken imports. All three are FATAL — we never want a
      # drifted/broken bundle to reach a device.
      - name: TypeScript check (tsc --noEmit)
        script: |
          set -e
          npx tsc --noEmit

      - name: Expo doctor (dependency + config health)
        script: |
          set -e
          npx --yes expo-doctor

      - name: Expo export (validate JS bundle compiles)
        script: |
          set -e
          npx expo export --platform android
          rm -rf dist   # validation artifact only; the installable build is via Gradle below

      # ----- 5. Expo prebuild — generate Android native project -------------
      # android/ is .gitignored, so we always regenerate it. --clean wipes
      # any stale state to guarantee a deterministic build.
      - name: Expo prebuild — generate Android native project
        script: |
          set -e
          npx expo prebuild --platform android --clean
          echo "Prebuild complete. Top-level android/ contents:"
          ls -la android/

      # ----- 6. Build Android APK ------------------------------------------
      # If CM_KEYSTORE_PATH is set, build signed release APK. Otherwise,
      # build debug APK (still installable for testing). Output is teed to
      # /tmp/build.log for the artifact bundle.
      - name: Build Android APK
        script: |
          # pipefail propagates Gradle failure through `tee` so the build
          # step actually fails (otherwise `set -e` would only check tee).
          set -euo pipefail
          mkdir -p /tmp
          cd android
          chmod +x gradlew

          if [ -n "${CM_KEYSTORE_PATH:-}" ]; then
            echo "Keystore detected — building SIGNED release APK"
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD" \
              --no-daemon \
              --stacktrace 2>&1 | tee /tmp/build.log
          else
            echo "No keystore — building DEBUG APK (still installable)"
            ./gradlew assembleDebug \
              --no-daemon \
              --stacktrace 2>&1 | tee /tmp/build.log
          fi

      # ----- 7. Verify APK exists + print metadata ------------------------
      # Runs AFTER the Gradle build. FAILS the build if Gradle reported
      # success but produced no APK (that mismatch is what shipped a
      # logs-only 16 KB artifact zip in build #7). No `set -e` here because
      # `find | head` + pipefail can SIGPIPE-fail spuriously; the explicit
      # check below is the gate.
      - name: Verify APK + print metadata
        script: |
          echo "PWD: $(pwd)"
          echo "--- APKs ---"; find . -type f -name "*.apk" -print 2>/dev/null || true
          echo "--- AABs ---"; find . -type f -name "*.aab" -print 2>/dev/null || true
          APK_PATH=$(find . -type f -path "*/build/outputs/apk/*/*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: Gradle reported success but no APK was found."
            exit 1
          fi
          echo "APK found: $APK_PATH"
          ls -lh "$APK_PATH"
          sha256sum "$APK_PATH"

      # ----- 8. Verify APK signature + package (safe — public cert only) ---
      # Confirms the release APK is signed (by the Codemagic 'ZentroMeet'
      # identity) and prints the certificate SHA-256 + package. NEVER prints
      # the keystore/key password or any private key. Non-fatal so a tooling
      # quirk can't fail an otherwise-good build.
      - name: Verify APK signature + package
        script: |
          APK_PATH=$(find . -type f -path "*/build/outputs/apk/*/*.apk" 2>/dev/null | head -1)
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          APKSIGNER=$(find "$SDK/build-tools" -name apksigner 2>/dev/null | sort -V | tail -1)
          AAPT2=$(find "$SDK/build-tools" -name aapt2 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ] && [ -n "$APK_PATH" ]; then
            echo "=== apksigner verify ==="
            "$APKSIGNER" verify --verbose --print-certs "$APK_PATH" \
              | grep -iE "verified|certificate (DN|SHA-256)|Number of signers" || true
          else
            echo "apksigner or APK not found — skipping signature print"
          fi
          if [ -n "$AAPT2" ] && [ -n "$APK_PATH" ]; then
            echo "=== package ==="; "$AAPT2" dump badging "$APK_PATH" 2>/dev/null | grep -E "^package:" || true
          fi

    artifacts:
      # Relative to working_directory (mobile). Codemagic resolves artifact
      # globs from the WORKING DIRECTORY, not the repo root — a `mobile/`
      # prefix double-nests to mobile/mobile/... and matches nothing (that is
      # what produced build #7's logs-only 16 KB zip). Robust ** covers the
      # release (and debug) variant.
      - android/app/build/outputs/apk/**/*.apk
      # NOTE: no mapping.txt — R8/ProGuard is OFF by default in the
      # RN 0.76 / Expo SDK 52 prebuild template, so no mapping file is
      # produced. If you later enable minification, re-add
      # android/app/build/outputs/mapping/release/mapping.txt
      - /tmp/install.log
      - /tmp/build.log

    publishing:
      email:
        recipients:
          - support@zentromeet.com
        notify:
          success: true
          failure: true

  # ===========================================================================
  # WORKFLOW 2: android-production
  # ---------------------------------------------------------------------------
  # Produces a signed Android App Bundle (.aab) ready for upload to Google
  # Play Console. Triggered manually or by pushes to `main`.
  #
  # SIGNING IS REQUIRED. The build fails fast if no keystore is configured.
  #
  # versionCode NOTE
  # ----------------
  # eas.json declares  appVersionSource: "remote"  with  autoIncrement: true
  # on the production profile, which means EAS's *remote* build pipeline
  # owns the canonical versionCode bump for store submissions. This Codemagic
  # workflow runs Gradle LOCALLY on Codemagic infrastructure, so versionCode
  # is read from app.json (currently android.versionCode = 3).
  #
  # Before tagging a production release on this workflow, the operator MUST
  # either:
  #   (a) bump android.versionCode in app.json by hand, commit, then push to
  #       main, or
  #   (b) skip this workflow entirely and run
  #         eas build --profile production --platform android
  #       which lets EAS auto-bump versionCode server-side.
  #
  # If you forget (a) and reuse a versionCode that's already on Play Console,
  # the upload will be rejected with "Version code N has already been used".
  # ===========================================================================
  android-production:
    name: "Android Production — Play Store AAB"
    instance_type: linux_x2
    max_build_duration: 90
    working_directory: mobile

    environment:
      node: 20.17.0
      java: 17
      # REQUIRED for production. Build aborts in step 2 if missing.
      android_signing:
        - ZentroMeet
      groups:
        - expo_credentials
        - zentromeet_api
      vars:
        # Same constraints as android-preview: EXPO_PUBLIC_API_BASE_URL
        # is defined in the zentromeet_api group directly (Codemagic does
        # NOT substitute $VARS in this block). Gradle heap held to 2.5 GB
        # to leave room for Node + Gradle daemon + OS on the 4 GB
        # linux_x2 instance.
        GRADLE_OPTS: "-Xmx2560m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
        EXPO_NO_TELEMETRY: "1"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
      # Production workflows do not declare cancel_previous_builds; the
      # Codemagic default (false) is what we want — every main-branch
      # build runs to completion.

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      # ----- 1. Environment info -------------------------------------------
      - name: Environment info
        script: |
          echo "Node:    $(node --version)"
          echo "npm:     $(npm --version)"
          echo "Java:    $(java -version 2>&1 | head -1)"
          echo "Branch:  $CM_BRANCH"
          echo "Commit:  $CM_COMMIT"
          echo "Build:   $CM_BUILD_ID"

      # ----- 2. Fail fast if no keystore configured ------------------------
      - name: Verify release keystore is configured
        script: |
          if [ -z "$CM_KEYSTORE_PATH" ]; then
            echo "ERROR: No Android release keystore configured."
            echo "Go to Codemagic → Teams → Code Signing → Android keystores"
            echo "and upload your release.keystore as 'ZentroMeet'."
            exit 1
          fi
          echo "Keystore found at: $CM_KEYSTORE_PATH"
          echo "Key alias:         $CM_KEY_ALIAS"

      # ----- 3. Install dependencies ---------------------------------------
      - name: Install dependencies
        script: |
          # pipefail so a failing npm step propagates through `tee`.
          # Without it, `set -e` only checks tee's exit status (always 0).
          set -euo pipefail
          mkdir -p /tmp
          if [ -f package-lock.json ]; then
            echo "package-lock.json found — using npm ci"
            npm ci --no-audit --no-fund 2>&1 | tee /tmp/install.log
          else
            echo "No package-lock.json — using npm install"
            npm install --no-audit --no-fund 2>&1 | tee /tmp/install.log
          fi

      # ----- 4. TypeScript check (permissive) ------------------------------
      # The project currently has four documented pre-existing TS errors
      # (Button.tsx, Card.tsx, usePushNotifications.ts,
      # appointments/[id]/index.tsx). Rather than gating every production
      # build on resolving those, we run tsc, capture the tail of the
      # output for visibility, and continue. Operators should still
      # eyeball the log on each production cut to confirm no NEW errors
      # have crept in.
      - name: TypeScript check
        script: |
          npx tsc --noEmit 2>&1 | tail -20 || true
          echo "TypeScript check complete (pre-existing errors tolerated)."

      # ----- 5. Verify EAS authentication ---------------------------------
      - name: Verify EAS authentication
        script: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "WARNING: EXPO_TOKEN is not set."
          else
            npx --yes eas-cli whoami 2>&1 || echo "eas-cli whoami failed (non-fatal for prebuild)"
          fi

      # ----- 6. Expo prebuild ----------------------------------------------
      - name: Expo prebuild — generate Android native project
        script: |
          set -e
          npx expo prebuild --platform android --clean
          echo "Prebuild complete."

      # ----- 7. Build signed AAB -------------------------------------------
      - name: Build signed AAB
        script: |
          set -euo pipefail
          mkdir -p /tmp
          cd android
          chmod +x gradlew
          echo "Building signed release AAB..."
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD" \
            --no-daemon \
            --stacktrace 2>&1 | tee /tmp/build.log

      # ----- 8. Verify AAB integrity ---------------------------------------
      - name: Verify AAB integrity
        script: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" 2>/dev/null | head -1)
          if [ -z "$AAB" ]; then
            echo "ERROR: AAB artifact not found after build."
            exit 1
          fi
          echo "AAB:  $AAB"
          echo "Size: $(du -h "$AAB" | cut -f1)"

    artifacts:
      # Relative to working_directory (mobile) — no `mobile/` prefix (see
      # android-preview note). Robust ** covers the release bundle.
      - android/app/build/outputs/bundle/**/*.aab
      # NOTE: no mapping.txt — see android-preview comment above. R8 is
      # off in the RN 0.76 / Expo SDK 52 prebuild template by default.
      # To enable mapping output, add `android.enableProguardInReleaseBuilds=true`
      # to android/gradle.properties post-prebuild and re-add the path
      # `android/app/build/outputs/mapping/release/mapping.txt` here.
      - /tmp/install.log
      - /tmp/build.log

    publishing:
      email:
        recipients:
          - support@zentromeet.com
        notify:
          success: true
          failure: true

  # ===========================================================================
  # WORKFLOW 3: ios-production
  # ---------------------------------------------------------------------------
  # Builds the iOS app NATIVELY on a Codemagic macOS (Apple-silicon) machine —
  # NO EAS Build. Full native pipeline, all on Codemagic:
  #
  #   npm ci → tsc / expo-doctor / unit tests → expo export (validate JS) →
  #   expo prebuild --platform ios --clean → pod install →
  #   discover workspace + scheme → xcode-project use-profiles (automatic
  #   signing) → xcode-project build-ipa (Xcode archive + App Store export) →
  #   validate the .ipa → (optional, flag-gated) upload to TestFlight.
  #
  # CODE SIGNING — AUTOMATIC, via the Codemagic App Store Connect API key
  # integration (integrations.app_store_connect) + environment.ios_signing.
  # Codemagic fetches/creates the Apple Distribution certificate + App Store
  # provisioning profile for com.zentromeet.app at build time. No .p8 / .p12 /
  # cert / profile / password is ever stored in git.
  #
  # TESTFLIGHT UPLOAD is HELD behind PUBLISH_TO_TESTFLIGHT (default "false"):
  # the workflow ALWAYS produces + validates a signed IPA artifact, and only
  # uploads to TestFlight — via Codemagic's own `app-store-connect publish`
  # (NOT EAS submit) — when PUBLISH_TO_TESTFLIGHT="true". It NEVER submits for
  # App Store review (that would require the `--app-store` flag, which we omit).
  #
  # Triggers: manual + push to `main`.
  # ===========================================================================
  ios-production:
    name: "iOS Production — App Store / TestFlight (native Codemagic build)"
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: mobile

    # App Store Connect API key INTEGRATION (created in the Codemagic UI:
    # Teams → <team> → Team integrations → Developer Portal → connect an App
    # Store Connect API key (.p8 + Issuer ID + Key ID) and NAME it). The name
    # below MUST match. Used for AUTOMATIC code signing (cert + profile fetch).
    integrations:
      app_store_connect: zentromeet_asc_api_key

    environment:
      # AUTOMATIC iOS signing. Combined with the integration above, Codemagic
      # fetches a distribution certificate + App Store provisioning profile for
      # this exact bundle id. distribution_type app_store covers TestFlight too.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zentromeet.app
      node: 20.17.0
      # Pin Xcode 16.2 — known-good for Expo SDK 52 / RN 0.76.9. Xcode 16.3 has
      # a C++ compile regression with RN 0.76 (expo/expo#35807). 16.0–16.2 OK.
      # Quoted so YAML keeps it a string (e.g. a future "16.0" won't coerce to 16).
      xcode: "16.2"
      cocoapods: default
      groups:
        # EXPO_PUBLIC_API_BASE_URL — inlined into the JS bundle at build time.
        - zentromeet_api
        # APP_STORE_CONNECT_ISSUER_ID / _KEY_IDENTIFIER / _PRIVATE_KEY — read by
        # `app-store-connect publish` for the flag-gated TestFlight upload.
        # ONLY consumed when PUBLISH_TO_TESTFLIGHT="true".
        - app_store_credentials
      vars:
        EXPO_NO_TELEMETRY: "1"
        # Asserted against the built IPA's CFBundleIdentifier.
        BUNDLE_ID: "com.zentromeet.app"
        # HELD by default. Flip to "true" in the Codemagic UI for this workflow
        # ONLY AFTER the App Store Connect integration + app_store_credentials
        # group are configured and verified. "false" → build + validate the IPA
        # but DO NOT upload anywhere (see "Upload to TestFlight" step).
        PUBLISH_TO_TESTFLIGHT: "false"
        # Minimum believable IPA size (bytes). A real Expo/RN IPA is tens of MB;
        # this guards against shipping an empty/tiny zip as the artifact.
        MIN_IPA_BYTES: "3000000"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods

    scripts:
      # ----- 1. Environment info -------------------------------------------
      - name: Environment info
        script: |
          echo "Node:      $(node --version)"
          echo "npm:       $(npm --version)"
          echo "Xcode:     $(xcodebuild -version 2>/dev/null | head -1)"
          echo "CocoaPods: $(pod --version 2>/dev/null)"
          echo "Branch:    $CM_BRANCH"
          echo "Commit:    $CM_COMMIT"
          echo "Build:     $CM_BUILD_ID"
          echo "Workdir:   $(pwd)"
          echo "Publish to TestFlight: $PUBLISH_TO_TESTFLIGHT"

      # ----- 2. Install dependencies (reproducible) ------------------------
      # package-lock.json IS committed, so use `npm ci` for a clean,
      # reproducible install pinned to the SDK-52-aligned versions.
      - name: Install dependencies
        script: |
          set -euo pipefail
          mkdir -p /tmp
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json is missing — it must be committed for reproducible CI." >&2
            exit 1
          fi
          npm ci --no-audit --no-fund 2>&1 | tee /tmp/install.log

      # ----- 3. Quality gates (fail fast BEFORE the expensive native build) -
      - name: TypeScript check (tsc --noEmit)
        script: |
          set -e
          npx tsc --noEmit

      - name: Expo doctor (dependency + config health)
        script: |
          set -e
          npx --yes expo-doctor

      - name: Mobile unit tests
        script: |
          set -e
          if ls tests/*.test.ts >/dev/null 2>&1; then
            npx --yes tsx --test tests/*.test.ts
          else
            echo "No test files under tests/ — skipping."
          fi

      - name: Expo export (validate iOS JS bundle compiles)
        script: |
          set -e
          npx expo export --platform ios
          rm -rf dist   # validation only; the installable build is via Xcode below

      # ----- 4. Pre-prebuild config assertions -----------------------------
      # Confirm the app config is correct BEFORE generating native code, so a
      # misconfig fails here with a clear message instead of deep in Xcode.
      - name: Assert app config (bundle id / build number / iPad / scheme / API)
        script: |
          set -euo pipefail
          node -e '
            const app = require("./app.json").expo;
            const ios = app.ios || {};
            const fail = (m) => { console.error("ASSERT FAILED: " + m); process.exit(1); };
            if (ios.bundleIdentifier !== "com.zentromeet.app") fail("ios.bundleIdentifier != com.zentromeet.app (got " + ios.bundleIdentifier + ")");
            if (!ios.buildNumber || !String(ios.buildNumber).trim()) fail("ios.buildNumber missing");
            if (ios.supportsTablet !== true) fail("ios.supportsTablet must be true (iPhone + iPad)");
            if (app.scheme !== "zentromeet") fail("scheme != zentromeet (OAuth callback URL scheme)");
            const ip = ios.infoPlist || {};
            if (ip.ITSAppUsesNonExemptEncryption !== false) fail("infoPlist.ITSAppUsesNonExemptEncryption must be false (export compliance)");
            for (const k of ["NSCameraUsageDescription","NSPhotoLibraryUsageDescription","NSContactsUsageDescription","NSLocationWhenInUseUsageDescription"]) {
              if (!ip[k]) fail("missing permission description " + k);
            }
            if (!Array.isArray(ios.associatedDomains) || !ios.associatedDomains.includes("applinks:app.zentromeet.com")) fail("associatedDomains missing applinks:app.zentromeet.com");
            const api = app.extra && app.extra.apiBaseUrl;
            if (!api || !/^https:\/\//.test(api)) fail("extra.apiBaseUrl must be an https URL");
            console.log("app config OK — bundle=" + ios.bundleIdentifier + " build=" + ios.buildNumber + " iPad=" + ios.supportsTablet + " scheme=" + app.scheme + " api=" + api);
          '
          for f in assets/icon.png assets/splash.png assets/notification-icon.png; do
            [ -f "$f" ] || { echo "ERROR: missing required asset $f"; exit 1; }
          done
          echo "Required assets present."

      # ----- 5. Expo prebuild — generate iOS native project ----------------
      # ios/ is .gitignored, so always regenerate. --clean = deterministic.
      - name: Expo prebuild — generate iOS native project
        script: |
          set -e
          npx expo prebuild --platform ios --clean
          echo "Prebuild complete. ios/ contents:"
          ls -la ios/

      # ----- 6. CocoaPods install (creates the .xcworkspace) ---------------
      # The .xcworkspace consumed by build-ipa only exists AFTER pod install.
      - name: Install CocoaPods dependencies
        script: |
          set -euo pipefail
          cd ios
          pod install
          echo "Pods installed."

      # ----- 7. Discover workspace + scheme (do NOT hardcode) --------------
      # Verify the generated names rather than assuming them. Export to
      # $CM_ENV so the build step can read them. Expected: ZentroMeet.
      - name: Discover Xcode workspace + scheme
        script: |
          set -euo pipefail
          # NOTE: every command substitution that pipes through `head`/`grep`
          # ends with `|| true` — under `set -euo pipefail` a no-match `ls`/grep
          # or an early-closing `head` (SIGPIPE) returns non-zero and would
          # otherwise ABORT the step before our own explicit checks can report.
          WORKSPACE=$(ls -d ios/*.xcworkspace 2>/dev/null | head -1 || true)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: no .xcworkspace under ios/ (did pod install fail?)"; exit 1
          fi
          WORKSPACE_NAME=$(basename "$WORKSPACE")
          # Shared schemes listed by the workspace (Pods schemes are not shared).
          # `|| true` on the whole substitution: xcodebuild -list can return
          # non-zero while still emitting valid JSON; don't let that abort us.
          SCHEMES=$(xcodebuild -workspace "$WORKSPACE" -list -json 2>/dev/null \
            | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const j=JSON.parse(s);console.log((j.workspace.schemes||[]).join("\n"))}catch(e){process.exit(0)}})' || true)
          echo "Schemes found:"; echo "$SCHEMES"
          PROJ=$(ls -d ios/*.xcodeproj 2>/dev/null | head -1 || true)
          EXPECT=$(basename "${PROJ%.xcodeproj}")
          SCHEME=$(echo "$SCHEMES" | grep -x "$EXPECT" || true)
          if [ -z "$SCHEME" ]; then SCHEME=$(echo "$SCHEMES" | grep -v '^$' | head -1 || true); fi
          if [ -z "$SCHEME" ]; then echo "ERROR: could not determine a build scheme"; exit 1; fi
          echo "Using workspace: $WORKSPACE_NAME"
          echo "Using scheme:    $SCHEME"
          echo "XCODE_WORKSPACE=$WORKSPACE_NAME" >> $CM_ENV
          echo "XCODE_SCHEME=$SCHEME" >> $CM_ENV

      # ----- 8. Apply provisioning profiles (automatic signing) ------------
      # Applies the Codemagic-fetched App Store profile to the app's Xcode
      # project AND writes $HOME/export_options.plist (which build-ipa reads).
      # --project scopes the glob to the app project so it can't pick up a
      # stray node_modules/*.xcodeproj; --warn-only stays as belt-and-braces.
      - name: Set up code signing (use-profiles)
        script: |
          set -euo pipefail
          xcode-project use-profiles --project "ios/*.xcodeproj" --warn-only
          # Make the use-profiles → build-ipa export-options contract explicit
          # and fail-closed: if signing setup didn't produce the plist, stop
          # here (instead of burning a 20-min archive that exports the wrong way).
          EXPORT_PLIST="$HOME/export_options.plist"
          if [ ! -f "$EXPORT_PLIST" ]; then
            echo "ERROR: use-profiles did not write $EXPORT_PLIST — code-signing setup failed."
            echo "Check the App Store Connect API key integration + environment.ios_signing."
            exit 1
          fi
          echo "Export options method: $(/usr/libexec/PlistBuddy -c 'Print :method' "$EXPORT_PLIST" 2>/dev/null || echo '(unreadable)')"

      # ----- 9. Build + archive + export the signed App Store IPA ----------
      # Must use --workspace (CocoaPods produces it), NOT --project. Paths are
      # relative to working_directory (mobile). build-ipa writes the .ipa to
      # build/ios/ipa and the raw xcodebuild log to /tmp/xcodebuild_logs.
      - name: Build signed IPA (Xcode archive → App Store export)
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --workspace "ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist"

      # ----- 10. Validate the IPA (HARD gates) -----------------------------
      # Fails the build unless the IPA exists, is a believable size, has the
      # right bundle id + a build number, is universal (iPhone + iPad), is
      # signed with an Apple Distribution cert, and was exported App Store
      # (not ad-hoc / not development).
      - name: Validate IPA (size / bundle id / build number / signing / export)
        script: |
          set -euo pipefail
          # `|| true` on these substitutions so a no-match glob / SIGPIPE from
          # head doesn't abort under pipefail BEFORE the explicit checks below.
          IPA=$(ls -1 build/ios/ipa/*.ipa 2>/dev/null | head -1 || true)
          if [ -z "$IPA" ]; then echo "ERROR: no IPA was produced"; exit 1; fi
          echo "IPA: $IPA"
          SIZE=$(stat -f%z "$IPA")
          echo "Size: $SIZE bytes (min $MIN_IPA_BYTES)"
          if [ "$SIZE" -lt "$MIN_IPA_BYTES" ]; then
            echo "ERROR: IPA size $SIZE < minimum $MIN_IPA_BYTES — likely an empty/broken archive"; exit 1
          fi
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(ls -d "$WORK"/Payload/*.app 2>/dev/null | head -1 || true)
          if [ -z "$APP" ]; then echo "ERROR: no .app inside the IPA Payload"; exit 1; fi
          PLIST="$APP/Info.plist"
          BID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST")
          BVER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          echo "CFBundleIdentifier: $BID"
          echo "CFBundleVersion:    $BVER"
          [ "$BID" = "$BUNDLE_ID" ] || { echo "ERROR: bundle id '$BID' != '$BUNDLE_ID'"; exit 1; }
          [ -n "$BVER" ] || { echo "ERROR: CFBundleVersion (build number) is missing"; exit 1; }
          # Universal: UIDeviceFamily must contain BOTH 1 (iPhone) and 2 (iPad).
          # Read the whole array once and word-match — robust to ordering/extra
          # entries, and set -e-safe (grep failure is consumed by `|| {...}`).
          FAMILIES=$(/usr/libexec/PlistBuddy -c "Print :UIDeviceFamily" "$PLIST" 2>/dev/null || echo "")
          echo "UIDeviceFamily:"; echo "$FAMILIES"
          echo "$FAMILIES" | grep -qw 1 || { echo "ERROR: missing iPhone family (UIDeviceFamily 1)"; exit 1; }
          echo "$FAMILIES" | grep -qw 2 || { echo "ERROR: missing iPad family (UIDeviceFamily 2) — not universal"; exit 1; }
          # Signing identity must be an Apple Distribution certificate.
          echo "=== codesign ==="
          codesign -dvv "$APP" 2>&1 | tee /tmp/codesign.txt | grep -iE "Authority|TeamIdentifier" || true
          if ! grep -qiE "Authority=Apple Distribution|Authority=iPhone Distribution" /tmp/codesign.txt; then
            echo "ERROR: signing identity is not an Apple Distribution certificate"; exit 1
          fi
          # Export method must be App Store. Decode the embedded profile
          # FAIL-CLOSED: if it can't be decoded to a real plist we must NOT
          # treat 'keys absent' as a pass (that would let a broken profile slip).
          if ! security cms -D -i "$APP/embedded.mobileprovision" > /tmp/profile.plist 2>/dev/null; then
            echo "ERROR: could not decode embedded.mobileprovision"; exit 1
          fi
          /usr/libexec/PlistBuddy -c "Print :Entitlements" /tmp/profile.plist >/dev/null 2>&1 \
            || { echo "ERROR: embedded profile did not decode to a valid plist (cannot verify export method)"; exit 1; }
          # App Store profiles have NO ProvisionedDevices (ad-hoc lists them)…
          if /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" /tmp/profile.plist >/dev/null 2>&1; then
            echo "ERROR: embedded profile lists ProvisionedDevices → ad-hoc, not an App Store export"; exit 1
          fi
          # …and get-task-allow=false (true would mean a development build).
          GTA=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" /tmp/profile.plist 2>/dev/null || echo "")
          echo "get-task-allow: $GTA"
          if [ "$GTA" = "true" ]; then
            echo "ERROR: get-task-allow=true → development signing, not distribution"; exit 1
          fi
          echo "IPA validation PASSED — universal App Store-signed build $BVER for $BID."

      # ----- 11. Collect dSYMs ---------------------------------------------
      - name: Collect dSYMs
        script: |
          set -e
          mkdir -p ios-dsyms
          find "$HOME/Library/Developer/Xcode/DerivedData" -name "*.dSYM" -exec cp -R {} ios-dsyms/ \; 2>/dev/null || true
          find build -name "*.dSYM" -exec cp -R {} ios-dsyms/ \; 2>/dev/null || true
          if [ -n "$(ls -A ios-dsyms 2>/dev/null)" ]; then
            ( cd ios-dsyms && zip -qr ../zentromeet-dsyms.zip . )
            echo "dSYM archive: zentromeet-dsyms.zip"
            ls -la ios-dsyms/
          else
            echo "WARNING: no dSYMs found (debug symbols will be unavailable for crash symbolication)."
          fi

      # ----- 12. Upload to TestFlight (HELD behind PUBLISH_TO_TESTFLIGHT) ---
      # Uses Codemagic's own `app-store-connect publish` CLI (NOT EAS submit).
      # --testflight  = upload + submit to TestFlight BETA review ONLY.
      # (We deliberately omit --app-store, so it NEVER submits for App Store
      # review.) Auth reads APP_STORE_CONNECT_ISSUER_ID / _KEY_IDENTIFIER /
      # _PRIVATE_KEY from the app_store_credentials group. These MUST be the
      # SAME App Store Connect API key used by the signing integration (paste
      # the .p8 with real newlines). Default skips the upload so the config
      # rollout produces a signed IPA without publishing.
      - name: Upload to TestFlight (flag-gated)
        script: |
          set -euo pipefail
          if [ "$PUBLISH_TO_TESTFLIGHT" != "true" ]; then
            echo "PUBLISH_TO_TESTFLIGHT='$PUBLISH_TO_TESTFLIGHT' — skipping TestFlight upload."
            echo "The signed IPA is available as a Codemagic artifact (build/ios/ipa/*.ipa)."
            echo "To enable: set PUBLISH_TO_TESTFLIGHT=\"true\" in the Codemagic UI for this"
            echo "workflow AFTER the App Store Connect API key integration + the"
            echo "app_store_credentials group are configured. It uploads to TestFlight"
            echo "ONLY — it never submits for App Store review."
            exit 0
          fi
          : "${APP_STORE_CONNECT_ISSUER_ID:?app_store_credentials group is missing APP_STORE_CONNECT_ISSUER_ID}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?app_store_credentials group is missing APP_STORE_CONNECT_KEY_IDENTIFIER}"
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?app_store_credentials group is missing APP_STORE_CONNECT_PRIVATE_KEY}"
          echo "Publishing with App Store Connect key id: $APP_STORE_CONNECT_KEY_IDENTIFIER (issuer $APP_STORE_CONNECT_ISSUER_ID)"
          echo "Uploading IPA to TestFlight (beta review only — never App Store review)…"
          app-store-connect publish \
            --path "build/ios/ipa/*.ipa" \
            --testflight \
            --max-build-processing-wait 20
          echo "TestFlight upload complete. App Store Connect → TestFlight shows the build in ~10-30 min."

    artifacts:
      # Relative to working_directory (mobile), except the absolute /tmp logs.
      - build/ios/ipa/*.ipa
      - zentromeet-dsyms.zip
      # Belt-and-braces: also publish dSYMs straight from the archive in case
      # the zip step found none in DerivedData.
      - build/ios/xcarchive/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log
      - /tmp/install.log
      - /tmp/codesign.txt

    publishing:
      # Build/result notification only. The TestFlight UPLOAD is handled by the
      # flag-gated `app-store-connect publish` step above (NOT a declarative
      # app_store_connect publishing block) so it can be HELD behind an env var
      # — Codemagic's submit_to_testflight boolean cannot be variable-driven.
      email:
        recipients:
          - support@zentromeet.com
        notify:
          success: true
          failure: true
