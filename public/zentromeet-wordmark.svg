<svg viewBox="0 0 520 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZentroMeet — Appointments. Automation. Growth.">
  <!-- ZentroMeet brand wordmark — vector approximation of the
       horizontal lockup (mark + wordmark + tagline). The PNG
       artwork can replace this file at any time without code
       changes; route paths reference "/zentromeet-wordmark.svg"
       so any swap is just a drop-in. -->

  <!-- Inline mark, scaled to fit the 100px lockup height -->
  <g transform="translate(0,5) scale(0.5625)">
    <circle cx="80" cy="80" r="80" fill="#2563EB"/>
    <circle cx="80" cy="80" r="71" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    <g fill="#0f172a">
      <rect x="40" y="40" width="80" height="15"/>
      <rect x="40" y="105" width="80" height="15"/>
    </g>
    <line x1="118" y1="48" x2="42" y2="112" stroke="#0f172a" stroke-width="22"/>
    <g fill="#0f172a">
      <path d="M 128 64 L 130 70 L 136 72 L 130 74 L 128 80 L 126 74 L 120 72 L 126 70 Z"/>
      <path d="M 139 79 L 140 83 L 144 84 L 140 85 L 139 89 L 138 85 L 134 84 L 138 83 Z"/>
    </g>
  </g>

  <!-- Wordmark — "Zentro" blue + "Meet" ink -->
  <text x="110" y="55" font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.2">
    <tspan fill="#2563EB">Zentro</tspan><tspan fill="#0f172a">Meet</tspan>
  </text>

  <!-- Tagline -->
  <text x="110" y="80" font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="#475569" letter-spacing="-0.1">
    Appointments. Automation. Growth.
  </text>
</svg>
